<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Password — Arcane Infrastructure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;800&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --void: #060606; --onyx: #111111; --parchment: #e8e0d0; --white: #f6f6f4; --border: rgba(255,255,255,0.08); --border-md: rgba(255,255,255,0.13); }
    body { background: var(--void); color: var(--white); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; -webkit-font-smoothing: antialiased; }
    body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px); background-size: 28px 28px; pointer-events: none; }
    .card { position: relative; background: var(--onyx); border: 1px solid var(--border); border-radius: 12px; padding: 48px 40px; width: 100%; max-width: 400px; animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .logo { margin-bottom: 32px; }
    .logo-wm { font-weight: 800; font-size: 20px; letter-spacing: -0.03em; text-transform: uppercase; }
    .logo-dept { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--parchment); display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .logo-dept::before { content: ''; width: 12px; height: 1px; background: currentColor; }
    h1 { font-weight: 800; font-size: 24px; letter-spacing: -0.03em; margin-bottom: 8px; }
    .sub { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(246,246,244,0.35); margin-bottom: 32px; }
    .field { margin-bottom: 16px; }
    label { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(246,246,244,0.4); display: block; margin-bottom: 8px; }
    input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border-md); border-radius: 6px; padding: 12px 14px; color: var(--white); font-family: 'Syne', sans-serif; font-size: 14px; transition: border-color 150ms; outline: none; }
    input:focus { border-color: rgba(232,224,208,0.4); }
    .hint { font-family: 'Space Mono', monospace; font-size: 9px; color: rgba(246,246,244,0.25); margin-top: 6px; letter-spacing: 0.08em; }
    .btn { width: 100%; margin-top: 8px; background: var(--parchment); color: var(--void); border: none; border-radius: 4px; padding: 14px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; transition: opacity 150ms; }
    .btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-wm">Arcane</div>
      <div class="logo-dept">Infrastructure</div>
    </div>
    <h1>Set Password</h1>
    <p class="sub">Create your account password</p>
    <form method="POST">
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
        <p class="hint">Minimum 8 characters</p>
      </div>
      <button type="submit" class="btn">Create Account →</button>
    </form>
  </div>
</body>
</html>
