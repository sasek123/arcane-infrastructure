<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64" width="64" height="64"
     role="img" aria-label="Arcane icon">
  <title>Arcane</title>
  <style>
    @media (prefers-color-scheme: dark) {
      .icon-bg   { fill: #060606; }
      .icon-border { stroke: #f6f6f4; }
      .icon-text { fill: #f6f6f4; }
    }
    @media (prefers-color-scheme: light) {
      .icon-bg   { fill: #f6f6f4; }
      .icon-border { stroke: #060606; }
      .icon-text { fill: #060606; }
    }
  </style>
  <rect width="64" height="64" rx="12" class="icon-bg"/>
  <rect x="1" y="1" width="62" height="62" rx="12"
        fill="none" class="icon-border" stroke-width="1" opacity="0.15"/>
  <text x="32.0" y="32.0"
        font-family="'Syne','Space Grotesk',sans-serif"
        font-size="30.7" font-weight="800"
        class="icon-text" text-anchor="middle"
        dominant-baseline="central">A</text>
</svg>
