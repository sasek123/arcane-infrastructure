<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 380 100" width="380" height="100"
     role="img" aria-label="Arcane Infrastructure logo">
  <title>Arcane Infrastructure</title>
  <desc>Arcane  Infrastructure brand wordmark</desc>

  <!-- background -->
  <rect width="380" height="100" fill="none" rx="0"/>

  <!-- wordmark -->
  <text x="24" y="55.0"
        font-family="'Syne', 'Space Grotesk', sans-serif"
        font-size="42" font-weight="800" letter-spacing="-1"
        fill="#060606" text-anchor="start"
        dominant-baseline="middle">ARCANE</text>

  <!-- dept line mark -->
  <line x1="24" y1="69.0" x2="40" y2="69.0"
        stroke="#444444" stroke-width="1.4" stroke-linecap="round"/>
  <!-- dept label -->
  <text x="46" y="72.0"
        font-family="'Syne', 'Space Grotesk', sans-serif"
        font-size="11" font-weight="400" letter-spacing="3.2"
        fill="#444444" text-anchor="start">INFRASTRUCTURE</text>
</svg>
